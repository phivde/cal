name: R Calendar Automation

on:
  # Permet de lancer le script manuellement depuis l'onglet Actions
  workflow_dispatch:
  # Déclenche le script automatiquement (ex: tous les jours à minuit)
  schedule:
    - cron: '0 0 * * *'

jobs:
  run-r-script:
    runs-on: ubuntu-latest
    
    steps:
      # 1. Récupérer le code du dépôt
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Installer R sur la machine virtuelle
      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      # 3. Installer les dépendances système nécessaires (si requis par vos packages)
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev

      # 4. Installer les packages R nécessaires
      - name: Install R packages
        run: Rscript -e 'install.packages("calendar", repos = "https://cloud.r-project.org")'

      # 5. Exécuter le script R
      - name: Run R Script
        run: Rscript .github/script.r
        env:
          # Ajoutez vos secrets ici si vous utilisez une API de calendrier
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}

      # 6. Sauvegarder et pousser les modifications sur GitHub (ex: si le script génère un fichier .ics ou .pdf)
      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@://github.com"
          git add -A
          git commit -m "Mise à jour automatique du calendrier [skip ci]" || echo "Aucun changement à valider"
          git push
